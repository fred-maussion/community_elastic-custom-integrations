# newer versions go on top
- version: "1.1.2"
  changes:
    - description: >-
        Fix the daily diff feed URL to fetch today's date instead of yesterday's. The daily diff feed was assumed to only be finalized after the day is over, but the vendor in fact publishes/updates the current day's file in real time, so fetching yesterday's file left the daily-diff path permanently one day behind newly added domains.
      type: bugfix
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/67
- version: "1.1.1"
  changes:
    - description: >-
        Add event.provider, marking which fetch mechanism (full_fetch or daily_diff) produced each document, so an operator can verify the two-cadence design introduced in 1.1.0 is actually alternating as expected.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/67
- version: "1.1.0"
  changes:
    - description: >-
        Add threat.indicator.first_seen, populated primarily from a new daily-diff feed poll with the existing full-feed fetch retained as a periodic reconciliation safety net. A deterministic document ID (fingerprint of the domain) combined with Elasticsearch data streams' append-only create semantics ensures a domain's first_seen is set once and never overwritten on later polls. threat.indicator.last_seen is not populated.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/67
- version: "1.0.0"
  changes:
    - description: >-
        Promote to v1.0.0: full elastic-package test coverage (static, policy, asset, pipeline, system) now passes, including validation against a live Elastic Security serverless project. Also fixes a local system-test port collision (docker-compose nginx service hardcoded to host port 8080, clashing with the elastic-package Package Registry container) and regenerates stale test fixtures.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/65
- version: "0.0.5"
  changes:
    - description: >-
        Fix data_stream.dataset default mismatch with event.dataset, preserve event.original, use append for event.category/event.type, fix CEL error-event shape, align ecs.version with build.yml, and complete base-fields.yml.
      type: bugfix
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/9
- version: "0.0.4"
  changes:
    - description: Adding system test
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/9
- version: "0.0.3"
  changes:
    - description: Adding policy test
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/9
- version: "0.0.2"
