---
description: Pipeline for processing OVHcloud Dedicated Servers account-wide provisioning/activity log events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'

  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null

  - json:
      field: event.original
      target_field: json
      tag: parse_json
      if: ctx.event?.original != null

  # --- Custom fields: dedicated server identity ---
  - rename:
      field: json.server
      target_field: ovh_dedicated_servers.log.server_name
      tag: rename_server_name
      ignore_missing: true
      description: The OVHcloud dedicated server service name this log entry pertains to (already present in the API response body for this endpoint).

  # --- ECS field mapping ---
  - rename:
      field: json.resume
      target_field: message
      tag: rename_resume_to_message
      ignore_missing: true
      description: Free-text short description of the logged event (e.g. "Access codes sent"). Fully open text, no enum -- there is no ECS field beyond `message` for this content.

  - date:
      field: json.datetime
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: parse_timestamp_from_datetime
      if: ctx.json?.datetime != null
      description: The log entry's own timestamp is the primary event time.
      on_failure:
        - remove:
            field: json.datetime
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'

  # --- ECS categorization ---
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_host
      value: host
      allow_duplicates: false
      description: >-
        Generic server-activity milestone feed (installs, reboots, access-code
        notifications) that does not cleanly fit a narrower ECS category, so
        `host` is used as the broad default since every entry pertains to an
        owned dedicated server.
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
      allow_duplicates: false
      description: Entries are informational milestone notices rather than explicit state changes with a known outcome.

  # --- related.* enrichment ---
  - append:
      field: related.hosts
      tag: append_server_name_to_related_hosts
      value: '{{{ovh_dedicated_servers.log.server_name}}}'
      allow_duplicates: false
      if: ctx.ovh_dedicated_servers?.log?.server_name != null

  # --- Cleanup ---
  - remove:
      field:
        - json
      ignore_missing: true
      tag: remove_temp_fields
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
