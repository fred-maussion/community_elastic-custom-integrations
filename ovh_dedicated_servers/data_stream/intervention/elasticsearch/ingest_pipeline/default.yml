---
description: Pipeline for processing OVHcloud Dedicated Servers hardware intervention history events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'

  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null

  - json:
      field: event.original
      target_field: json
      tag: parse_json
      if: ctx.event?.original != null

  # --- Custom fields: dedicated server identity and record discriminator ---
  - rename:
      field: json.serviceName
      target_field: ovh_dedicated_servers.server_name
      tag: rename_service_name
      ignore_missing: true
      description: The OVHcloud dedicated server service name the intervention belongs to (injected by the CEL collector).
  - rename:
      field: json.planned
      target_field: ovh_dedicated_servers.intervention.planned
      tag: rename_planned
      ignore_missing: true
      description: >-
        Discriminator injected by the collector: true for a scheduled future
        intervention (plannedIntervention API), false for a past/completed
        intervention (intervention API).
  - rename:
      field: json.status
      target_field: ovh_dedicated_servers.intervention.status
      tag: rename_status
      ignore_missing: true
      description: Status of a planned intervention (doing, done, todo). Only present when planned is true.

  # --- ECS field mapping ---
  # event.id is normalized from either raw field, since only one is present per record.
  - rename:
      field: json.interventionId
      target_field: event.id
      tag: rename_intervention_id_to_event_id
      ignore_missing: true
      description: Identifier of a past intervention. Only present when planned is false.
  - rename:
      field: json.id
      target_field: event.id
      tag: rename_id_to_event_id
      ignore_missing: true
      description: Identifier of a planned intervention. Only present when planned is true.
  - rename:
      field: json.type
      target_field: event.action
      tag: rename_type_to_event_action
      ignore_missing: true
      description: Free-text intervention type, treated as an open string.

  - date:
      field: json.wantedStartDate
      target_field: event.start
      formats:
        - ISO8601
      tag: parse_event_start_from_wanted_start_date
      if: ctx.json?.wantedStartDate != null
      description: Requested start date/time of a planned intervention.
      on_failure:
        - remove:
            field: json.wantedStartDate
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
  - date:
      field: json.expectedEndDate
      target_field: event.end
      formats:
        - ISO8601
      tag: parse_event_end_from_expected_end_date
      if: ctx.json?.expectedEndDate != null
      description: Expected end date/time of a planned intervention.
      on_failure:
        - remove:
            field: json.expectedEndDate
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
  - date:
      field: json.date
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: parse_timestamp_from_date
      if: ctx.json?.date != null
      description: Date the past intervention occurred. Only present when planned is false.
      on_failure:
        - remove:
            field: json.date
            ignore_missing: true
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
  - set:
      field: '@timestamp'
      tag: set_timestamp_from_event_start
      copy_from: event.start
      if: ctx.ovh_dedicated_servers?.intervention?.planned == true && ctx.event?.start != null
      description: For planned interventions, the requested start date/time is also the primary event timestamp.

  # --- ECS categorization ---
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_host
      value: host
      allow_duplicates: false
      description: Broad default for hardware-lifecycle events on an owned dedicated server.
  - append:
      field: event.type
      tag: append_event_type_end
      value: end
      allow_duplicates: false
      if: ctx.ovh_dedicated_servers?.intervention?.planned == true && ctx.ovh_dedicated_servers?.intervention?.status == 'done'
      description: A completed planned intervention represents the end of a scheduled activity.
  - append:
      field: event.type
      tag: append_event_type_info
      value: info
      allow_duplicates: false
      if: ctx.ovh_dedicated_servers?.intervention?.planned != true || ctx.ovh_dedicated_servers?.intervention?.status != 'done'
      description: Past interventions and pending/in-progress planned interventions are informational.
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: success
      if: ctx.ovh_dedicated_servers?.intervention?.planned == true && ctx.ovh_dedicated_servers?.intervention?.status == 'done'

  # --- related.* enrichment ---
  - append:
      field: related.hosts
      tag: append_service_name_to_related_hosts
      value: '{{{ovh_dedicated_servers.server_name}}}'
      allow_duplicates: false
      if: ctx.ovh_dedicated_servers?.server_name != null

  # --- Cleanup ---
  - remove:
      field:
        - json
      ignore_missing: true
      tag: remove_temp_fields
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
