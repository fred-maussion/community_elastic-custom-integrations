---
description: Pipeline for processing OVHcloud Dedicated Servers task history events.
processors:
  - set:
      field: ecs.version
      tag: set_ecs_version
      value: '9.3.0'

  - remove:
      field:
        - organization
        - division
        - team
      ignore_missing: true
      if: ctx.organization instanceof String && ctx.division instanceof String && ctx.team instanceof String
      tag: remove_agentless_tags
      description: >-
        Removes the fields added by Agentless as metadata,
        as they can collide with ECS fields.
  - terminate:
      tag: data_collection_error
      if: ctx.error?.message != null && ctx.message == null && ctx.event?.original == null
      description: error message set and no data to process.

  - rename:
      field: message
      tag: rename_message_to_event_original
      target_field: event.original
      ignore_missing: true
      description: Renames the original `message` field to `event.original` to store a copy of the original message. The `event.original` field is not touched if the document already has one; it may happen when Logstash sends the document.
      if: ctx.event?.original == null
  - remove:
      field: message
      tag: remove_message
      ignore_missing: true
      description: The `message` field is no longer required if the document has an `event.original` field.
      if: ctx.event?.original != null

  - json:
      field: event.original
      target_field: json
      tag: parse_json
      if: ctx.event?.original != null

  # --- Custom fields: dedicated server identity ---
  - rename:
      field: json.serviceName
      target_field: ovh_dedicated_servers.server_name
      tag: rename_service_name
      ignore_missing: true
      description: The OVHcloud dedicated server service name the task belongs to (injected by the CEL collector).

  # --- ECS field mapping ---
  - rename:
      field: json.taskId
      target_field: event.id
      tag: rename_task_id_to_event_id
      ignore_missing: true
  - rename:
      field: json.function
      target_field: event.action
      tag: rename_function_to_event_action
      ignore_missing: true
      description: The raw OVH task function name (e.g. reinstallServer, hardReboot) treated as an open string.
  - rename:
      field: json.comment
      target_field: message
      tag: rename_comment_to_message
      ignore_missing: true
      if: ctx.json?.comment != null
  - set:
      field: message
      tag: set_message_from_event_action
      copy_from: event.action
      if: ctx.message == null && ctx.event?.action != null
      description: Falls back to the task function name as the message when the API did not provide a comment.

  - date:
      field: json.startDate
      target_field: event.start
      formats:
        - ISO8601
      tag: parse_event_start
      if: ctx.json?.startDate != null
      on_failure:
        - remove:
            field: json.startDate
            ignore_missing: true
            tag: remove_invalid_start_date
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
            tag: append_error_parse_event_start
  - date:
      field: json.doneDate
      target_field: event.end
      formats:
        - ISO8601
      tag: parse_event_end
      if: ctx.json?.doneDate != null
      on_failure:
        - remove:
            field: json.doneDate
            ignore_missing: true
            tag: remove_invalid_done_date
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
            tag: append_error_parse_event_end
  - date:
      field: json.lastUpdate
      target_field: '@timestamp'
      formats:
        - ISO8601
      tag: parse_timestamp_from_last_update
      if: ctx.json?.lastUpdate != null
      description: The task's last-update time is the most reliable always-present timestamp and is used as the primary event time.
      on_failure:
        - remove:
            field: json.lastUpdate
            ignore_missing: true
            tag: remove_invalid_last_update
        - append:
            field: error.message
            value: '{{{_ingest.on_failure_message}}}'
            tag: append_error_parse_last_update

  # --- Custom fields: task attributes with no ECS equivalent ---
  - rename:
      field: json.status
      target_field: ovh_dedicated_servers.task.status
      tag: rename_status
      ignore_missing: true
  - rename:
      field: json.note
      target_field: ovh_dedicated_servers.task.note
      tag: rename_note
      ignore_missing: true
      if: ctx.json?.note != null
  - rename:
      field: json.needSchedule
      target_field: ovh_dedicated_servers.task.need_schedule
      tag: rename_need_schedule
      ignore_missing: true
  - rename:
      field: json.plannedInterventionId
      target_field: ovh_dedicated_servers.task.planned_intervention_id
      tag: rename_planned_intervention_id
      ignore_missing: true
      if: ctx.json?.plannedInterventionId != null
  - rename:
      field: json.changeUuid
      target_field: ovh_dedicated_servers.task.change_uuid
      tag: rename_change_uuid
      ignore_missing: true
      if: ctx.json?.changeUuid != null
  - rename:
      field: json.ticketReference
      target_field: ovh_dedicated_servers.task.ticket_reference
      tag: rename_ticket_reference
      ignore_missing: true
      if: ctx.json?.ticketReference != null
  - rename:
      field: json.tags
      target_field: ovh_dedicated_servers.task.tags
      tag: rename_tags
      ignore_missing: true

  # --- ECS categorization ---
  - set:
      field: event.kind
      tag: set_event_kind
      value: event
  - append:
      field: event.category
      tag: append_event_category_host
      value: host
      allow_duplicates: false
      description: >-
        Tasks span many sub-domains (network moves, IAM/session for IPMI,
        configuration changes for firewall/ACL) that do not cleanly fit a
        single ECS category, so `host` is used as the broad default since
        every task acts on an owned dedicated server.
  - append:
      field: event.type
      tag: append_event_type_change
      value: change
      allow_duplicates: false
      description: Most task functions represent a change applied to the dedicated server or its configuration.
  - set:
      field: event.outcome
      tag: set_event_outcome_success
      value: success
      if: ctx.ovh_dedicated_servers?.task?.status == 'done'
  - set:
      field: event.outcome
      tag: set_event_outcome_failure
      value: failure
      if: ctx.ovh_dedicated_servers?.task?.status == 'customerError' || ctx.ovh_dedicated_servers?.task?.status == 'ovhError'

  # --- related.* enrichment ---
  - append:
      field: related.hosts
      tag: append_service_name_to_related_hosts
      value: '{{{ovh_dedicated_servers.server_name}}}'
      allow_duplicates: false
      if: ctx.ovh_dedicated_servers?.server_name != null

  # --- Cleanup ---
  - remove:
      field:
        - json
      ignore_missing: true
      tag: remove_temp_fields
  - append:
      field: tags
      tag: append_preserve_original_event
      value: preserve_original_event
      allow_duplicates: false
      if: ctx.error?.message != null

on_failure:
  - append:
      field: error.message
      value: >-
        Processor '{{{ _ingest.on_failure_processor_type }}}'
        {{{#_ingest.on_failure_processor_tag}}}with tag '{{{ _ingest.on_failure_processor_tag }}}'
        {{{/_ingest.on_failure_processor_tag}}}failed with message '{{{ _ingest.on_failure_message }}}'
  - set:
      field: event.kind
      tag: set_pipeline_error_to_event_kind
      value: pipeline_error
  - append:
      field: tags
      value: preserve_original_event
      allow_duplicates: false
