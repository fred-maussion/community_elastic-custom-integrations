# newer versions go on top
- version: "5.0.2"
  changes:
    - description: Fix GitGuardian Secret Alerts dashboard referencing a hardcoded backing index instead of the generic logs-gitguardian.internal_secret_alert-* data stream pattern, and realign its saved-object id/title with the file name.
      type: bugfix
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/71
- version: "5.0.1"
  changes:
    - description: Compress screenshot PNGs (~68% size reduction) and remove openapi.json from package tracking.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/60
    - description: Pin Kibana saved search typeMigrationVersion to 10.12.0 to ensure compatibility with Kibana 9.4 and above.
      type: bugfix
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/62
    - description: Raise minimum Kibana version requirement to 9.4.0 to match dashboard saved-object schema requirements.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/64
- version: "5.0.0"
  changes:
    - description: Add public_secret_alert data stream collecting public secrets incidents from the GitGuardian /v1/public-incidents/secrets endpoint with ECS mapping (event.kind=alert, event.category=[intrusion_detection,vulnerability], rule.name, vulnerability.severity) and community feedback support.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/58
- version: "4.0.0"
  changes:
    - description: Add secret_occurrence data stream collecting raw detection events from the GitGuardian /v1/occurrences/secrets endpoint with ECS mapping (event.kind=event, event.category=vulnerability, user.*, file.path) and commit author identity for Entity Analytics.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/55
- version: "3.0.0"
  changes:
    - description: Add honeytoken_event data stream collecting trigger events from the GitGuardian /v1/honeytokens_events endpoint with ECS mapping (event.kind=alert, event.category=intrusion_detection, source.ip) and GeoIP enrichment.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/54
- version: "2.0.0"
  changes:
    - description: Add audit_log data stream collecting events from the GitGuardian /v1/audit_logs endpoint with ECS mapping (event.kind, event.action, event.type, user.*, source.ip) and GeoIP enrichment.
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/52
- version: "1.0.0"
  changes:
    - description: Initial version of the package
      type: enhancement
      link: https://github.com/fred-maussion/community_elastic-custom-integrations/issues/48
