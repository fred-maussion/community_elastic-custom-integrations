---
description: Pipeline for processing GitGuardian audit log events.
processors:
  - set:
      tag: set_ecs_version
      field: ecs.version
      value: "9.3.0"
  - rename:
      tag: rename_message
      field: message
      target_field: event.original
      ignore_missing: true
      if: ctx.event?.original == null
  - json:
      tag: parse_original_json
      field: event.original
      target_field: gitguardian.audit_log
  - remove:
      tag: remove_message
      field: message
      ignore_missing: true
      if: ctx.event?.original != null
  - date:
      tag: parse_timestamp
      field: gitguardian.audit_log.date
      target_field: "@timestamp"
      formats:
        - ISO8601
      if: ctx.gitguardian?.audit_log?.date != null
  - set:
      tag: set_event_kind
      field: event.kind
      value: event
  - set:
      tag: set_event_category
      field: event.category
      value: [iam]
  - set:
      tag: set_event_provider
      field: event.provider
      value: GitGuardian
  - set:
      tag: set_event_action
      field: event.action
      copy_from: gitguardian.audit_log.event_name
      ignore_empty_value: true
  - script:
      tag: map_action_type_to_event_type
      lang: painless
      if: ctx.gitguardian?.audit_log?.action_type != null
      source: |
        def actionType = ctx.gitguardian.audit_log.action_type;
        if (actionType == "READ") {
          ctx.event.type = ["info"];
        } else if (actionType == "CREATE") {
          ctx.event.type = ["creation"];
        } else if (actionType == "UPDATE") {
          ctx.event.type = ["change"];
        } else if (actionType == "DELETE") {
          ctx.event.type = ["deletion"];
        } else {
          ctx.event.type = ["info"];
        }
  - set:
      tag: set_user_email
      field: user.email
      copy_from: gitguardian.audit_log.member_email
      ignore_empty_value: true
  - set:
      tag: set_user_name
      field: user.name
      copy_from: gitguardian.audit_log.member_email
      ignore_empty_value: true
  - set:
      tag: set_user_name
      field: user.full_name
      copy_from: gitguardian.audit_log.member_name
      ignore_empty_value: true
  - convert:
      tag: set_user_id
      field: gitguardian.audit_log.member_id
      target_field: user.id
      type: string
      ignore_missing: true
      ignore_failure: true
  - convert:
      tag: convert_member_id_to_string
      field: gitguardian.audit_log.member_id
      type: string
      ignore_missing: true
      ignore_failure: true
  - convert:
      tag: convert_id_to_string
      field: gitguardian.audit_log.id
      type: string
      ignore_missing: true
      ignore_failure: true
  - set:
      tag: set_source_ip
      field: source.ip
      copy_from: gitguardian.audit_log.ip_address
      ignore_empty_value: true
  - geoip:
      tag: geoip_source
      field: source.ip
      target_field: source.geo
      ignore_missing: true
      ignore_failure: true
  - geoip:
      tag: geoip_source_asn
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - asn
        - organization_name
      ignore_missing: true
      ignore_failure: true
  - rename:
      tag: rename_source_as_asn
      field: source.as.asn
      target_field: source.as.number
      ignore_missing: true
  - rename:
      tag: rename_source_as_org
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - remove:
      tag: remove_null_api_token_id
      field: gitguardian.audit_log.api_token_id
      if: ctx.gitguardian?.audit_log?.api_token_id == null
      ignore_missing: true
  - remove:
      tag: remove_null_member_id
      field: gitguardian.audit_log.member_id
      if: ctx.gitguardian?.audit_log?.member_id == null
      ignore_missing: true
  - remove:
      tag: remove_null_member_email
      field: gitguardian.audit_log.member_email
      if: ctx.gitguardian?.audit_log?.member_email == null
      ignore_missing: true
  - remove:
      tag: remove_null_member_name
      field: gitguardian.audit_log.member_name
      if: ctx.gitguardian?.audit_log?.member_name == null
      ignore_missing: true
  - remove:
      tag: remove_null_date
      field: gitguardian.audit_log.date
      if: ctx.gitguardian?.audit_log?.date == null
      ignore_missing: true
  - remove:
      tag: remove_null_data
      field: gitguardian.audit_log.data
      if: ctx.gitguardian?.audit_log?.data == null
      ignore_missing: true
  - remove:
      tag: remove_gitguardian_ip
      field: gitguardian.audit_log.ip_address
      ignore_missing: true
  - remove:
      tag: remove_event_original
      field: event.original
      if: "ctx.tags == null || !ctx.tags.contains('preserve_original_event')"
      ignore_missing: true
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: "Processor {{{_ingest.on_failure_processor_type}}} with tag {{{_ingest.on_failure_processor_tag}}} in pipeline {{{_ingest.pipeline}}} failed with message: {{{_ingest.on_failure_message}}}"
