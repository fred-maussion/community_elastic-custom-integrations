format_version: 3.5.2
name: gitguardian
title: "GitGuardian"
version: 5.0.2
source:
  license: "Apache-2.0"
description: "Collect secrets incidents, audit logs, honeytoken events, secret occurrences, and public secret alerts from the GitGuardian API."
type: integration
categories:
  - security
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/gitguardian-screenshot-1.png
    title: GitGuardian Secrets Incidents Dashboard
    size: 600x600
    type: image/png
  - src: /img/gitguardian-screenshot-2.png
    title: GitGuardian Alert Incident
    size: 600x600
    type: image/png
icons:
  - src: /img/gitguardian-logo.svg
    title: GitGuardian
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: gitguardian
    title: GitGuardian
    description: Collect incidents and audit logs from GitGuardian.
    inputs:
      - type: cel
        title: Collect Audit Logs & Secrets Incidents via API
        description: Collecting secrets incidents from the GitGuardian API.
owner:
  github: fred-maussion
  type: community
